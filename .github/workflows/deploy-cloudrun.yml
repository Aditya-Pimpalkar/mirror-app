name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: mirror-app-aditya
  GCP_REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_ID_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          export_default_credentials: true

      - name: Debug gcloud auth
        run: |
          echo "gcloud auth list:"
          gcloud auth list
          echo "Active account:"
          gcloud auth list --format="value(account)" --filter="status:ACTIVE"

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push persona-service image
        run: |
          SERVICE=persona-service
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/mirror-services/${SERVICE}:$GITHUB_SHA"
          docker build -t "$IMAGE" services/persona-service
          docker push "$IMAGE"
          gcloud run deploy mirror-persona-service \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --quiet

      - name: Build and push profile-service image
        run: |
          SERVICE=profile-service
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/mirror-services/${SERVICE}:$GITHUB_SHA"
          docker build -t "$IMAGE" services/profile-service
          docker push "$IMAGE"
          gcloud run deploy mirror-profile-service \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --quiet

      - name: Build and push synthesis-service image
        run: |
          SERVICE=synthesis-service
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/mirror-services/${SERVICE}:$GITHUB_SHA"
          docker build -t "$IMAGE" services/synthesis-service
          docker push "$IMAGE"
          gcloud run deploy mirror-synthesis-service \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --quiet

      - name: Build and push notification-service image
        run: |
          SERVICE=notification-service
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/mirror-services/${SERVICE}:$GITHUB_SHA"
          docker build -t "$IMAGE" services/notification-service
          docker push "$IMAGE"
          gcloud run deploy mirror-notification-service \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --quiet

