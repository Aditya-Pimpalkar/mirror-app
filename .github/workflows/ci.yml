name: Mirror CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            services/persona-service/package-lock.json
            services/profile-service/package-lock.json
            services/synthesis-service/package-lock.json
      - run: cd services/persona-service && npm ci
      - run: cd services/profile-service && npm ci
      - run: cd services/synthesis-service && npm ci
      - run: |
          cd services/persona-service && npm test --if-present || true
          cd ../profile-service && npm test --if-present || true
          cd ../synthesis-service && npm test --if-present || true

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Dockerfiles and key files
        run: |
          test -f services/persona-service/Dockerfile    && echo "✓ persona Dockerfile"
          test -f services/profile-service/Dockerfile    && echo "✓ profile Dockerfile"
          test -f services/synthesis-service/Dockerfile  && echo "✓ synthesis Dockerfile"
          test -f cloudbuild.yaml                        && echo "✓ cloudbuild.yaml"
          test -f scripts/deploy-all.sh                  && echo "✓ deploy-all.sh"
          test -f firebase/firestore.rules               && echo "✓ firestore.rules"
